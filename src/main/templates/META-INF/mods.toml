modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/RelativityMC/raise-sound-limit-simplified/issues"
clientSideOnly = true
showAsResourcePack = false
showAsDataPack = false

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="assets/rsls/icon.png"
authors="${mod_authors}"
description='''${mod_description}'''
displayURL = "https://github.com/RelativityMC/raise-sound-limit-simplified"

[[mixins]]
config="rsls.mixins.json"

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"
